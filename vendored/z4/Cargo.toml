[workspace]
resolver = "2"
exclude = ["fuzz"]
members = [
    "crates/z4",
    "crates/z4-core",
    "crates/z4-sat",
    "crates/z4-qbf",
    "crates/z4-maxsat",
    "crates/z4-allsat",
    "crates/z4-circuits",
    "crates/z4-proof-complexity",
    "crates/z4-barriers",
    "crates/z4-dpll",
    "crates/z4-frontend",
    "crates/z4-proof",
    "crates/z4-tla-bridge",
    "crates/z4-lean-bridge",
    "crates/z4-chc",
    "crates/z4-ffi",
    "crates/z4-theories/euf",
    "crates/z4-theories/lra",
    "crates/z4-theories/lia",
    "crates/z4-theories/bv",
    "crates/z4-theories/arrays",
    "crates/z4-theories/strings",
    "crates/z4-theories/seq",
    "crates/z4-theories/fp",
    "crates/z4-theories/dt",
    "crates/z4-theories/nia",
    "crates/z4-theories/nra",
    "crates/z4-xor",
    "crates/z4-translate",
    "crates/z4-bindings",
    "crates/z4-drat-check",
    "crates/z4-lrat-check",
    "crates/z4-proof-common",
    "crates/z4-flatzinc-parser",
    "crates/z4-flatzinc-smt",
    "crates/z4-fzn2smt",
    "crates/z4-cp",
    "crates/z4-sys",
    "crates/z4-prefetch",
    "crates/z4-jit",
    "crates/z4-bench",
]

[workspace.package]
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/andrewdyates/z4"
homepage = "https://github.com/andrewdyates/z4"
authors = ["Andrew Yates <andrewyates.name@gmail.com>"]

readme = "README.md"
[workspace.lints.rust]
# Kani model checker sets the 'kani' cfg flag
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)', 'cfg(z4_logging)'] }
unreachable_pub = "warn"
unsafe_op_in_unsafe_fn = "warn"
unused_qualifications = "warn"
elided_lifetimes_in_paths = "warn"
trivial_numeric_casts = "warn"
unused_lifetimes = "warn"
unused_import_braces = "warn"
unused_macro_rules = "warn"
non_ascii_idents = "forbid"
keyword_idents_2024 = "forbid"

[workspace.lints.clippy]
# === Group enables (low priority so individual overrides win) ===
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -2 }
nursery = { level = "warn", priority = -3 }

# === Pedantic allows — too noisy or inapplicable for solver code ===
missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
too_many_lines = "allow"
similar_names = "allow"
struct_excessive_bools = "allow"
fn_params_excessive_bools = "allow"
too_many_arguments = "allow"
implicit_hasher = "allow"
doc_markdown = "allow"
items_after_statements = "allow"
single_match_else = "allow"
wildcard_imports = "allow"
collapsible_else_if = "allow"
collapsible_if = "allow"
needless_continue = "allow"
if_not_else = "allow"
needless_raw_string_hashes = "allow"
used_underscore_binding = "allow"
return_self_not_must_use = "allow"
cast_possible_truncation = "allow"     # Too noisy in numeric solver — tracked in #3000
cast_possible_wrap = "allow"           # Same rationale
cast_sign_loss = "allow"               # Same rationale
cast_precision_loss = "allow"          # Same rationale
unreadable_literal = "allow"
match_bool = "allow"
inline_always = "allow"
redundant_else = "allow"
manual_let_else = "allow"              # match-based patterns are equally clear in solver code
match_same_arms = "allow"              # Often intentional for readability across enum variants
unused_self = "allow"                  # Methods may need &self for trait conformance or future use
single_char_pattern = "allow"          # .split(",") vs .split(',') is trivial
many_single_char_names = "allow"       # Math/solver code legitimately uses x, y, z, a, b, c
trivially_copy_pass_by_ref = "allow"   # Rarely matters for perf
needless_pass_by_value = "allow"       # Would require API changes that ripple across crate boundaries
match_wildcard_for_single_variants = "allow" # _ as default is fine for future-proofing
semicolon_if_nothing_returned = "allow" # Pure style preference
struct_field_names = "allow"           # Common in domain-specific code
unnested_or_patterns = "allow"         # Style preference
only_used_in_recursion = "allow"       # Valid recursive design pattern
if_then_some_else_none = "allow"       # .then(||) is less clear than explicit if/else
comparison_chain = "allow"             # Explicit if/else chains are clearer for solver conditions
unnecessary_wraps = "allow"            # Functions may return Result/Option for consistency
ref_option = "allow"                   # &Option<T> is common in internal APIs
no_effect_underscore_binding = "allow" # Used for side-effectful expressions
verbose_bit_mask = "allow"             # Bit operations are common in solver code
range_minus_one = "allow"              # ..=(n-1) is equivalent to ..n, both are clear
assigning_clones = "allow"             # x = y.clone() vs x.clone_from(y) is micro-optimization
format_push_string = "allow"           # write! vs push_str(format!()) is style preference
float_cmp = "allow"                    # Exact float comparison is intentional in solver arithmetic
needless_pass_by_ref_mut = "allow"     # Nursery lint, false positives on complex control flow
debug_assert_with_mut_call = "allow"   # debug_assert with side effects is intentional
type_complexity = "allow"              # Complex types are common in solver internals
bool_to_int_with_if = "allow"          # Explicit if/else is clearer than u32::from(bool)
map_unwrap_or = "allow"               # .map().unwrap_or() sometimes needed for type inference
needless_collect = "allow"             # Sometimes needed for borrow checker
same_functions_in_if_condition = "allow" # Intentional in solver logic
from_iter_instead_of_collect = "allow" # Style preference
cloned_ref_to_slice_refs = "allow"     # Nursery lint, false positives
needless_borrows_for_generic_args = "allow" # Style preference
default_trait_access = "allow"         # Type::default() vs Default::default() is preference
unnecessary_map_or = "allow"           # Style preference
iter_on_single_items = "allow"         # Sometimes clearer with iter pattern
explicit_iter_loop = "allow"           # for x in &v vs for x in v.iter() is style
collection_is_never_read = "warn"      # Dead code: fix individual instances, not blanket allow

# === Nursery allows — unstable or too noisy ===
missing_const_for_fn = "allow"
option_if_let_else = "allow"
cognitive_complexity = "allow"
significant_drop_tightening = "allow"
branches_sharing_code = "allow"
fallible_impl_from = "allow"
useless_let_if_seq = "allow"
or_fun_call = "allow"
redundant_pub_crate = "allow"          # Conflicts with unreachable_pub

# === Restriction lints — cherry-picked for real bugs ===
dbg_macro = "warn"
todo = "warn"
unimplemented = "warn"
print_stdout = "allow"                 # Too noisy: println! used in tests and CLI output
print_stderr = "allow"                 # Too noisy: eprintln! used in tests and diagnostics
# unwrap_used: deferred to #3000 (trust boundary unwrap audit)
# get_unwrap: deferred to #3000
clone_on_ref_ptr = "allow"             # Too noisy: Arc::clone() vs .clone() is style preference
rc_buffer = "warn"
rc_mutex = "warn"
rest_pat_in_fully_bound_structs = "warn"
empty_drop = "warn"
empty_structs_with_brackets = "warn"
# undocumented_unsafe_blocks: deferred until unsafe audit complete
# missing_assert_message: too noisy for test code (no per-target override)
# allow_attributes_without_reason: conflicts with targeted allows in test modules

[workspace.dependencies]
# Core dependencies
hashbrown = "0.15"
bumpalo = "3.16"
parking_lot = "0.12"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde_json = "1"
tempfile = "3.14"

# Numeric
num-rational = "0.4"
num-bigint = "0.4"
num-traits = "0.2"
num-integer = "0.1"
rug = { version = "1", default-features = false, features = ["rational"] }

# Parsing
logos = "0.15"

# Hash / collections
rustc-hash = "2.1"
smallvec = "1.13"

# Utilities
stacker = "0.1.22"
bytemuck = { version = "1", features = ["derive"] }

# Testing/Benchmarking
criterion = "0.5"
proptest = "1.5"
serial_test = "3.2"
ntest = "0.9"
wait-timeout = "0.2.1"
pollster = "0.3"
wgpu = "0.19"

# Internal crates
z4 = { version = "0.9.0", path = "crates/z4" }
z4-core = { version = "0.9.0", path = "crates/z4-core" }
z4-sat = { version = "0.9.0", path = "crates/z4-sat" }
z4-dpll = { version = "0.9.0", path = "crates/z4-dpll" }
z4-frontend = { version = "0.9.0", path = "crates/z4-frontend" }
z4-proof = { version = "0.9.0", path = "crates/z4-proof" }
z4-tla-bridge = { version = "0.9.0", path = "crates/z4-tla-bridge" }
z4-euf = { version = "0.9.0", path = "crates/z4-theories/euf" }
z4-lra = { version = "0.9.0", path = "crates/z4-theories/lra" }
z4-lia = { version = "0.9.0", path = "crates/z4-theories/lia" }
z4-bv = { version = "0.9.0", path = "crates/z4-theories/bv" }
z4-arrays = { version = "0.9.0", path = "crates/z4-theories/arrays" }
z4-seq = { version = "0.9.0", path = "crates/z4-theories/seq" }
z4-strings = { version = "0.9.0", path = "crates/z4-theories/strings" }
z4-fp = { version = "0.9.0", path = "crates/z4-theories/fp" }
z4-dt = { version = "0.9.0", path = "crates/z4-theories/dt" }
z4-nia = { version = "0.9.0", path = "crates/z4-theories/nia" }
z4-nra = { version = "0.9.0", path = "crates/z4-theories/nra" }
z4-chc = { version = "0.9.0", path = "crates/z4-chc" }
z4-qbf = { version = "0.9.0", path = "crates/z4-qbf" }
z4-maxsat = { version = "0.9.0", path = "crates/z4-maxsat" }
z4-allsat = { version = "0.9.0", path = "crates/z4-allsat" }
z4-circuits = { version = "0.9.0", path = "crates/z4-circuits" }
z4-proof-complexity = { version = "0.9.0", path = "crates/z4-proof-complexity" }
z4-barriers = { version = "0.9.0", path = "crates/z4-barriers" }
z4-lean-bridge = { version = "0.9.0", path = "crates/z4-lean-bridge" }
z4-xor = { version = "0.9.0", path = "crates/z4-xor" }
z4-translate = { version = "0.9.0", path = "crates/z4-translate" }
z4-bindings = { version = "0.9.0", path = "crates/z4-bindings" }
z4-drat-check = { version = "0.9.0", path = "crates/z4-drat-check" }
z4-lrat-check = { version = "0.9.0", path = "crates/z4-lrat-check" }
z4-proof-common = { version = "0.9.0", path = "crates/z4-proof-common" }
z4-flatzinc-parser = { version = "0.9.0", path = "crates/z4-flatzinc-parser" }
z4-flatzinc-smt = { version = "0.9.0", path = "crates/z4-flatzinc-smt" }
z4-cp = { version = "0.9.0", path = "crates/z4-cp" }
z4-sys = { version = "0.9.0", path = "crates/z4-sys" }
z4-prefetch = { version = "0.9.0", path = "crates/z4-prefetch" }
z4-jit = { version = "0.9.0", path = "crates/z4-jit" }

# Cranelift JIT (removed — replaced by custom assembler in z4-jit)

# CLI
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }

# External deps for flatzinc crates
anyhow = "1"
libc = "0.2"
nix = { version = "0.29", default-features = false, features = ["process", "signal", "term"] }

[profile.release]
lto = "thin"
# codegen-units set in .cargo/config.toml (16 for build memory; 1 here is dead config)
panic = "abort"
overflow-checks = false

# Compile third-party deps at opt-level=2 even in debug builds.
# Deps rarely change so they're compiled once and cached. Cuts debug binary sizes
# and improves test performance for hot-loop-heavy crates (hashbrown, num-bigint).
[profile.dev.package."*"]
opt-level = 2

[profile.release-perf]
inherits = "release"
lto = "fat"
codegen-units = 1
overflow-checks = false

[profile.bench]
lto = "thin"
