SPECIFICATION Spec

\* This config demonstrates how caching bugs (like #278) can cause false positives.
\* With CachingEnabled = TRUE, the model includes non-deterministic cache behavior
\* that can return stale values, causing spurious invariant violations.

CONSTANTS
    Workers = {1, 2}
    States = {100, 200, 300}
    InitStates = {100}
    \* SuccessorFn: 100 -> {200}, 200 -> {300}, 300 -> {}
    SuccessorFn = (100 :> {200}) @@ (200 :> {300}) @@ (300 :> {})
    \* InvariantFn: All states satisfy invariant
    InvariantFn = (100 :> TRUE) @@ (200 :> TRUE) @@ (300 :> TRUE)
    CachingEnabled = TRUE

INVARIANT TypeOK
INVARIANT NoDoubleExploration

\* This property WILL BE VIOLATED when caching is buggy:
\* The cache can return wrong values causing false positives
PROPERTY NoFalsePositives
