[package]
name = "z4-drat-check"
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/andrewdyates/z4"
homepage = "https://github.com/andrewdyates/z4"
authors = ["Andrew Yates <andrewyates.name@gmail.com>"]
documentation = "https://docs.rs/z4-drat-check"
description = "Standalone DRAT/DRUP proof checker for SAT solver certificates"
readme = "README.md"

[lib]
name = "z4_drat_check"
path = "src/lib.rs"

[[bin]]
name = "z4-drat-check"
path = "src/main.rs"

[dependencies]
thiserror = "2.0"
z4-proof-common = { version = "0.9.0", path = "../z4-proof-common" }
[dev-dependencies]
proptest = "1"
