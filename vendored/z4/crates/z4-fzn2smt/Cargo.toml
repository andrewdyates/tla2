# Andrew Yates <andrewyates.name@gmail.com>
# fzn2smt — FlatZinc to SMT-LIB2 translation CLI and solver driver
#
# Reads a .fzn file, translates constraints to SMT-LIB2 using flatzinc-smt,
# and optionally pipes to z4 for solving. Outputs solutions in DZN format.
#
# Usage:
#   fzn2smt translate model.fzn     # Print SMT-LIB2 to stdout
#   fzn2smt solve model.fzn         # Translate, pipe to z4, output DZN
#   fzn2smt info model.fzn          # Print model statistics

[package]
name = "z4-fzn2smt"
version = "0.9.0"
edition = "2021"
authors = ["Andrew Yates <andrewyates.name@gmail.com>"]
license = "Apache-2.0"
description = "FlatZinc to SMT-LIB2 CLI tool and solver driver for MiniZinc Challenge"
readme = "README.md"
repository = "https://github.com/andrewdyates/z4"
homepage = "https://github.com/andrewdyates/z4"
documentation = "https://docs.rs/z4-fzn2smt"



[[bin]]
name = "fzn2smt"
path = "src/main.rs"

[dependencies]
z4-flatzinc-parser = { version = "0.9.0", path = "../z4-flatzinc-parser" }
z4-flatzinc-smt = { version = "0.9.0", path = "../z4-flatzinc-smt", features = ["z4-library"] }
z4-cp = { version = "0.9.0", path = "../z4-cp" }
anyhow = "1"
