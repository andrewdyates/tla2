# tla-getrandom — verbatim fork of getrandom 0.2.17
#
# Upstream: https://github.com/rust-random/getrandom (tag 0.2.17)
# License: MIT OR Apache-2.0 (preserved in LICENSE-MIT / LICENSE-APACHE).
# Forked 2026-04-19 as part of the TLA2 zero-external-dep posture (Part of
# #4250). Consumers import `use getrandom::*` unchanged via `[patch.crates-io]`
# redirection.
#
# Package `name` stays "getrandom" so `[patch.crates-io]` applies to every
# transitive graph consumer (rand_core, uuid, rustix, etc.) — same
# upstream-name-preserving pattern as tla-cfg-if / tla-rand / tla-indexmap.
# The workspace directory name "tla-getrandom" marks it as the TLA2 fork.
#
# Scope (umbrella-only): ONLY the getrandom 0.2.x crate itself is forked.
# Its runtime deps (cfg-if — forked in Wave 17; libc — upstream leaf dep; wasi
# — upstream leaf dep for wasi targets) remain external. cfg-if resolves to
# our workspace fork via the existing `[patch.crates-io]` redirect.
#
# Only 0.2.x is patched here: getrandom 0.3.x has a different public API
# (moved error surface, new WASI handling) and is tracked separately. The
# workspace graph currently contains getrandom 0.1, 0.2, 0.3, and 0.4; only
# 0.2 is the majority consumer (pulled by rand_core 0.6, uuid, rustix), which
# is why this wave targets 0.2.17. See `[patch.crates-io]` note in the
# workspace Cargo.toml for version-scoped patching.

[package]
name = "getrandom"
version = "0.2.17" # Also update html_root_url in lib.rs when bumping this
edition = "2018"
authors = [
    "Andrew Yates",
    "The Rand Project Developers",
]
license = "MIT OR Apache-2.0"
description = "TLA2 verbatim fork of getrandom 0.2.17 (Part of #4250). A small cross-platform library for retrieving random data from system source."
documentation = "https://docs.rs/getrandom"
repository = "https://github.com/andrewdyates/tla2"
readme = "README.md"
categories = ["os", "no-std"]
exclude = [".*"]

[dependencies]
cfg-if = "1"

# When built as part of libstd
compiler_builtins = { version = "0.1", optional = true }
core = { version = "1.0", optional = true, package = "rustc-std-workspace-core" }

[target.'cfg(unix)'.dependencies]
libc = { version = "0.2.154", default-features = false }

[target.'cfg(target_os = "wasi")'.dependencies]
wasi = { version = "0.11", default-features = false }

# wasm-bindgen / js-sys optional deps removed in tla-getrandom fork (Part of
# #4301, Wave 68). Fed the js-sys -> wasm-bindgen -> serde_json (fork) -> ...
# -> getrandom -> js-sys cycle through cargo's feature resolver even though
# the deps are target-gated cfg(wasm*). TLA2 does not build for
# wasm*-unknown-unknown, so these browser bindings are dead code. The
# companion `js` feature and corresponding cfg-guarded browser-RNG backend
# are also removed. Restore only if a consumer needs wasm32 RNG.
[target.'cfg(all(any(target_arch = "wasm32", target_arch = "wasm64"), target_os = "unknown"))'.dev-dependencies]
wasm-bindgen-test = "0.3.18"

[features]
# Implement std-only traits for getrandom::Error
std = []
# Disable `/dev/urandom` fallback for Linux and Android targets.
# Bumps minimum supported Linux kernel version to 3.17 and Android API level to 23 (Marshmallow).
linux_disable_fallback = []
# Feature to enable fallback RDRAND-based implementation on x86/x86_64
rdrand = []
# `js` feature removed in tla-getrandom fork with wasm-bindgen / js-sys deps
# (Part of #4301). Original: js = ["wasm-bindgen", "js-sys"].
# Feature to enable custom RNG implementations
custom = []
# Unstable feature to support being a libstd dependency
rustc-dep-of-std = [
  "compiler_builtins",
  "core",
  "libc/rustc-dep-of-std",
  "wasi/rustc-dep-of-std",
]
# Unstable/test-only feature to run wasm-bindgen tests in a browser
test-in-browser = []

[package.metadata.docs.rs]
features = ["std", "custom"]
rustdoc-args = ["--cfg", "docsrs"]

# workaround for https://github.com/cross-rs/cross/issues/1345
[package.metadata.cross.target.x86_64-unknown-netbsd]
pre-build = [
  "mkdir -p /tmp/netbsd",
  "curl https://cdn.netbsd.org/pub/NetBSD/NetBSD-9.2/amd64/binary/sets/base.tar.xz -O",
  "tar -C /tmp/netbsd -xJf base.tar.xz",
  "cp /tmp/netbsd/usr/lib/libexecinfo.so /usr/local/x86_64-unknown-netbsd/lib",
  "rm base.tar.xz",
  "rm -rf /tmp/netbsd",
]

# NOTE: We intentionally do NOT apply the workspace pedantic lints here.
# This is a verbatim upstream fork; enabling pedantic lints would generate
# warnings on code we did not write.
