[package]
# Upstream name preserved so `[patch.crates-io]` can redirect all crates.io
# consumers (including external z4 crates) to this fork. Source files stay
# verbatim — no internal import rewrites required.
name = "num-traits"
version = "0.2.19"
edition = "2021"
rust-version = "1.60"
license.workspace = true
authors = [
    "Andrew Yates",
    "The Rust Project Developers",
    "rust-num project contributors",
]
description = "Fork of num-traits for TLA2 (zero-dep posture)"
build = "build.rs"

[dependencies]
libm = { version = "0.2.0", optional = true }

[build-dependencies]
autocfg = "1"

[features]
default = ["std"]
i128 = []
libm = ["dep:libm"]
std = []
