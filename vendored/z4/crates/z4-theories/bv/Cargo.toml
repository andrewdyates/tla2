[package]
name = "z4-bv"
description = "Bitvector theory solver for Z4"
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/andrewdyates/z4"
readme = "README.md"



[dependencies]
z4-core = { version = "0.9.0", path = "../../z4-core" }
z4-sat = { version = "0.9.0", path = "../../z4-sat" }
hashbrown = "0.15"
num-bigint = "0.4"
num-integer = "0.1"
tracing = "0.1"
stacker = "0.1.22"
[dev-dependencies]
proptest = "1.5"
criterion = "0.5"
