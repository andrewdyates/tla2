\* TLC Model Checking Configuration for Editor.tla (full bounds)
\*
\* Tests editor state machine properties:
\* - Cursor always valid (would catch bugs #88, #89, #95)
\* - Undo/redo symmetry
\* - Group depth non-negative
\* - Modified flag correct
\*
\* WARNING: Exhaustive verification requires dedicated hardware.
\* Generates 10^12+ states, takes days, creates 30+ GB state files.
\*
\* For CI smoke tests, use simulation mode:
\*   java -jar tla2tools.jar -simulate num=10000 -config Editor.cfg Editor.tla
\* Or use Editor-quick.cfg / Editor-minimal.cfg for reduced bounds.
\*
\* See issue #127 and reports/research/2026-01-18-state-space-rigorous-analysis.md

