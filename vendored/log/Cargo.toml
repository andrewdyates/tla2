[package]
edition = "2021"
name = "log"
version = "0.4.29"
description = "No-op logging stub — macros expand to nothing"
license = "MIT OR Apache-2.0"

[lib]
name = "log"
path = "src/lib.rs"

# All features accepted but ignored — keeps downstream Cargo.toml compatible.
[features]
kv = []
kv_serde = []
kv_std = []
kv_sval = []
kv_unstable = []
kv_unstable_serde = []
kv_unstable_std = []
kv_unstable_sval = []
max_level_debug = []
max_level_error = []
max_level_info = []
max_level_off = []
max_level_trace = []
max_level_warn = []
release_max_level_debug = []
release_max_level_error = []
release_max_level_info = []
release_max_level_off = []
release_max_level_trace = []
release_max_level_warn = []
serde = []
std = []
