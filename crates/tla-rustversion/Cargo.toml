# Verbatim umbrella-only fork of dtolnay/rustversion 1.0.22 (MIT OR Apache-2.0).
# Part of #4250 zero-external-dep posture (Wave 40).
#
# `rustversion` is a proc-macro crate providing conditional compilation macros
# like `#[rustversion::since(1.56)]`. Pure Rust with zero runtime deps (it
# queries the compiler at build time via a tiny build.rs). ~19 transitive
# consumers across the workspace graph (num-traits, thiserror-impl,
# proc-macro2, regex, rayon, and the long tail of crates using its
# `#[stable]` / `#[since]` / `#[before]` gates).
#
# Fork keeps upstream `[package] name = "rustversion"` and
# `[lib] proc-macro = true` so `[patch.crates-io]` redirects every transitive
# consumer to this single in-tree copy — same pattern as thiserror / tokio /
# serde_json / futures-util etc. Dev-dependency on `trybuild` dropped
# (compile-test harness not part of the production build); the `tests/` and
# `build/` directories are kept verbatim so the source stays bit-for-bit with
# upstream. Version kept at upstream 1.0.22 (the workspace has no other
# rustversion major in the graph).

[package]
edition = "2018"
rust-version = "1.31"
name = "rustversion"
version = "1.0.22"
authors = ["David Tolnay <dtolnay@gmail.com>"]
build = "build/build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Conditional compilation according to rustc compiler version"
documentation = "https://docs.rs/rustversion"
readme = "README.md"
categories = [
    "development-tools::build-utils",
    "no-std",
    "no-std::no-alloc",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/dtolnay/rustversion"
publish = false

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = [
    "--generate-link-to-definition",
    "--extern-html-root-url=core=https://doc.rust-lang.org",
    "--extern-html-root-url=alloc=https://doc.rust-lang.org",
    "--extern-html-root-url=std=https://doc.rust-lang.org",
    "--extern-html-root-url=proc_macro=https://doc.rust-lang.org",
]

[lib]
name = "rustversion"
path = "src/lib.rs"
proc-macro = true
