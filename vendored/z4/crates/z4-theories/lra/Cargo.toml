[package]
name = "z4-lra"
description = "Linear Real Arithmetic theory solver for Z4"
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/andrewdyates/z4"
readme = "README.md"



[dependencies]
z4-core = { version = "0.9.0", path = "../../z4-core" }
num-rational = "0.4"
num-bigint = "0.4"
num-traits = "0.2"
num-integer = "0.1"
hashbrown = "0.15"
tracing = "0.1"
smallvec = "1.13"
[dev-dependencies]
proptest = "1.5"