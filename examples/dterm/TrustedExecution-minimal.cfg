\* TrustedExecution-minimal.cfg - Minimal config for exhaustive verification
\* Small state space for quick CI validation

\* Model values - minimal for exhaustive check
CONSTANTS
    MaxSteps = 2
    MaxSnapshots = 2
    TimingThreshold = 2
    MaxClock = 4
    MaxHash = 3

\* Initial state and next-state relation
INIT Init
NEXT Next

\* Verify invariants
INVARIANTS
    TypeInvariant
    SafetyInvariant
    ExecutionNoDeadlock

\* State constraint for bounded model checking
CONSTRAINT
    StateConstraint
