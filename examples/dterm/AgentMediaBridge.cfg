\* TLC Model Checking Configuration for AgentMediaBridge.tla

\* Use small constants for tractable model checking
CONSTANTS
    MaxAgents = 2
    MaxClients = 2
    MaxVoiceCommands = 2

\* Specification format
SPECIFICATION Spec

\* Deadlock checking - disabled because spec has legitimate quiescent states
\* (empty system, saturated system) where stuttering is the only valid action
CHECK_DEADLOCK FALSE

\* Invariants to check
INVARIANTS
    TypeInvariant
    SafetyInvariant
    MappingsBijective
    ActiveVoiceAgentRegistered
    VoiceStateConsistent
    PendingCommandsValid
