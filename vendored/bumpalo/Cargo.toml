# Vendored bumpalo 3.20.2 — stripped to core bump allocation.
# Original: https://github.com/fitzgen/bumpalo
# License: MIT OR Apache-2.0

[package]
edition = "2021"
rust-version = "1.71.1"
name = "bumpalo"
version = "3.20.2"
authors = ["Nick Fitzgerald <fitzgen@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A fast bump allocation arena for Rust."
license = "MIT OR Apache-2.0"
repository = "https://github.com/fitzgen/bumpalo"

[features]
allocator_api = []
allocator-api2 = ["dep:allocator-api2"]
boxed = []
collections = []
default = []
serde = ["dep:serde"]
std = []

[lib]
name = "bumpalo"
path = "src/lib.rs"
bench = false

[dependencies.allocator-api2]
version = "0.2.8"
optional = true
default-features = false

[dependencies.serde]
version = "1.0.171"
optional = true
