[workspace.package]
version = "0.9.1"
edition = "2021"
authors = ["Andrew Yates"]
license = "Apache-2.0"
repository = "https://github.com/andrewdyates/tla2"
rust-version = "1.75"

readme = "README.md"
[workspace.dependencies]
# z4 - pure-Rust SMT solver (pinned to published OSS release v0.10.1)
# Source: https://github.com/andrewdyates/z4
# Includes: bucket-queue VSIDS, IC3 activation variables, ITE simplification fix,
# probe HBR fix, BVE reconstruction, SAT-COMP preprocessing fixes.
z4-dpll = { git = "https://github.com/andrewdyates/z4", rev = "de29585817d4a611eb169564b33d193cbd98a4b3" }
z4-core = { git = "https://github.com/andrewdyates/z4", rev = "de29585817d4a611eb169564b33d193cbd98a4b3" }
z4-allsat = { git = "https://github.com/andrewdyates/z4", rev = "de29585817d4a611eb169564b33d193cbd98a4b3" }
z4-chc = { git = "https://github.com/andrewdyates/z4", rev = "de29585817d4a611eb169564b33d193cbd98a4b3" }
z4-sat = { git = "https://github.com/andrewdyates/z4", rev = "de29585817d4a611eb169564b33d193cbd98a4b3" }
z4-frontend = { git = "https://github.com/andrewdyates/z4", rev = "de29585817d4a611eb169564b33d193cbd98a4b3" }

# tMIR - proof-carrying SSA IR for the t* stack
# Source: https://github.com/andrewdyates/tMIR
tmir = { git = "https://github.com/andrewdyates/tMIR.git", rev = "02b4f872948b67fe61632765c31542da7166dfe4" }
tmir-build = { git = "https://github.com/andrewdyates/tMIR.git", rev = "02b4f872948b67fe61632765c31542da7166dfe4" }

# LLVM2 - verified native compiler backend (tMIR -> AArch64/x86 machine code)
# Source: https://github.com/andrewdyates/LLVM2
# Zero C deps: pure Rust ISel + RegAlloc + Encoding + JIT (raw syscalls, no libc)
llvm2-codegen = { git = "https://github.com/andrewdyates/LLVM2.git", rev = "fc7623c069c63b95b14bd4886157ab4044b00bd2" }
llvm2-ir = { git = "https://github.com/andrewdyates/LLVM2.git", rev = "fc7623c069c63b95b14bd4886157ab4044b00bd2" }
llvm2-lower = { git = "https://github.com/andrewdyates/LLVM2.git", rev = "fc7623c069c63b95b14bd4886157ab4044b00bd2" }

# tla-jit-abi - leaf crate holding the stable JIT/AOT calling-convention
# ABI types (JitCallOut, JitStatus, JitRuntimeErrorKind, JitRuntimeError +
# function-pointer aliases). Exists to break the tla-tmir -> tla-jit cargo
# dependency cycle so tla-llvm2 can own the full JIT/AOT pipeline without a
# back-edge through tla-jit. Consumers: tla-tmir, tla-llvm2, tla-jit,
# tla-jit-runtime. Part of #4265 (Stage 2b of epic #4251).
tla-jit-abi = { path = "crates/tla-jit-abi" }

# Core
thiserror = "2.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Parsing
# logos → tla-logos fork (Part of #4250, Tier 2 zero-dep). The fork at
# crates/tla-logos/ keeps the upstream `name = "logos"` so `[patch.crates-io]`
# redirects any transitive consumer; no package alias needed at the consumer site.
logos = { path = "crates/tla-logos" }
# rowan → tla-rowan fork (Part of #4250, Tier 2 zero-dep). The crate at
# crates/tla-rowan keeps the upstream `name = "rowan"` so `[patch.crates-io]`
# can redirect transitive pulls through the fork; no package alias needed at
# the consumer site.
rowan = { path = "crates/tla-rowan" }

# Async
tokio = { version = "1.0", features = ["full"] }

# CLI
clap = { version = "4.0", features = ["derive"] }
clap_complete = "4.5"
indicatif = "0.17"

# Errors and diagnostics
# ariadne → tla-ariadne fork (Part of #4250, Tier 2 zero-dep). Consumers
# keep `use ariadne::*` via the `package = "tla-ariadne"` alias. yansi and
# unicode-width remain as crates.io leaf deps (pure-Rust, small).
ariadne = { path = "crates/tla-ariadne", package = "tla-ariadne" }

# Data structures
# indexmap → tla-indexmap fork (Part of #4250, Tier 2 zero-dep). Fork keeps
# upstream package name `indexmap` so `[patch.crates-io]` redirects all graph
# consumers (serde_json, toml, petgraph, wasmparser, cranelift-entity, etc.)
# to the single workspace fork at `crates/tla-indexmap/`.
# hashbrown is forked in Wave 19 (see [patch.crates-io] below).
# equivalent / serde-optional remain upstream leaf deps.
indexmap = { path = "crates/tla-indexmap" }
# Forked hasher stack — `[patch.crates-io]` redirects all graph references
# (including transitive deps like cranelift and z4-chc) to the workspace forks.
# Keeps all 358+ consumer import sites unchanged.
# See crates/tla-hash-fx and crates/tla-hash-xxh3 for the verbatim sources.
rustc-hash = { path = "crates/tla-hash-fx" }
xxhash-rust = { path = "crates/tla-hash-xxh3", default-features = false, features = ["xxh3"] }
# dashmap → tla-dashmap fork (Part of #4250, Tier 2 zero-dep). Package name
# stays `dashmap` via upstream-preserving fork at `crates/tla-dashmap/`, so
# `[patch.crates-io]` redirects every transitive consumer to one copy.
dashmap = { path = "crates/tla-dashmap" }
parking_lot = { package = "tla-lock", path = "crates/tla-lock/parking_lot" }
# crossbeam → tla-crossbeam fork (Part of #4250, Tier 2 zero-dep). Fork keeps
# upstream package name `crossbeam` so `[patch.crates-io]` redirects all graph
# consumers (tla-check parallel BFS, tla-eval, rayon-deps, etc.). Only the
# umbrella crate is forked; crossbeam-{channel,deque,epoch,queue,utils} remain
# external leaf deps (scope-limited fork, same as rowan/bumpalo/stacker).
crossbeam = { path = "crates/tla-crossbeam" }
# tla-smallvec — in-workspace fork of smallvec (Part of #4250, Tier 3 zero-dep).
# The workspace alias name stays `smallvec` via `package = "tla-smallvec"` so
# consumer crates do not need to change `use smallvec::...` imports.
smallvec = { path = "crates/tla-smallvec", package = "tla-smallvec", features = ["union"] }
# rand → tla-rand fork (Part of #4250, Tier 2 zero-dep). Workspace members
# keep `use rand::...` unchanged; fork directory is crates/tla-rand/ but the
# package name stays "rand" so `[patch.crates-io]` redirects transitive deps.
# Subtree crates (rand_core, rand_chacha, getrandom, etc.) remain external.
rand = { path = "crates/tla-rand", features = ["small_rng"] }
rayon = "1.10"

# bumpalo → tla-arena fork (Part of #4250). Workspace members write
# `bumpalo.workspace = true` and use `use bumpalo::*` unchanged; the
# `package = "tla-arena"` alias routes to crates/tla-arena/ internally.
bumpalo = { path = "crates/tla-arena", package = "tla-arena" }

# Persistent immutable collections — forked to crates/tla-im from im 15.1
# (Part of #4250, Tier 2 zero-external-dep, MPL-2.0). The `package = "tla-im"`
# alias keeps the `use im::HashMap` import form unchanged in consumer crates.
im = { path = "crates/tla-im", package = "tla-im" }

# Numbers — TLA2 fork of the rust-num stack (Tier 2 zero-dep).
# Paths resolve to `crates/tla-bignum/{bigint,integer,traits}/`; the package
# names still match crates.io so `[patch.crates-io]` (below) redirects every
# transitive consumer — including external z4 crates — to the fork.
num-bigint = { path = "crates/tla-bignum/bigint", default-features = false, features = ["std"] }
num-integer = { path = "crates/tla-bignum/integer", default-features = false, features = ["std", "i128"] }
num-traits = { path = "crates/tla-bignum/traits", default-features = false, features = ["std", "i128"] }
tla-bignum = { path = "crates/tla-bignum" }
# minilp → tla-minilp fork (Part of #4250, Tier 2 zero-dep). Used by tla-petri
# for LP-based invariant checks. The crate at crates/tla-minilp keeps the
# upstream `name = "minilp"` so `[patch.crates-io]` can redirect transitive
# pulls through the fork; no package alias needed at the consumer site.
minilp = { path = "crates/tla-minilp" }

# stacker → tla-stack fork (Part of #4250, Tier 2 zero-dep). Workspace members
# write `stacker.workspace = true` and use `use stacker::*` unchanged; the
# `package = "tla-stack"` alias routes to crates/tla-stack/ internally.
# psm/libc/cfg-if remain upstream leaf deps (native, not forkable inline).
# Note: z4-bv transitively pulls crates.io stacker. Same pattern as
# bumpalo/tla-arena — acceptable; the fork covers the primary consumer path.
stacker = { path = "crates/tla-stack", package = "tla-stack" }

# Arc fork (vendored triomphe as `tla-arc`, aliased here as `triomphe` so
# consumer crates need no source changes). Part of the Tier 3 zero-external-dep
# posture: the vendored source lives at `crates/tla-arc/` with preserved
# MIT/Apache-2.0 licensing and upstream attribution.
triomphe = { path = "crates/tla-arc", package = "tla-arc", default-features = false, features = ["std", "serde", "stable_deref_trait"] }

# LSP
tower-lsp = "0.20"

# File watching
# notify → tla-notify fork (Part of #4250, Tier 2 zero-dep). Fork keeps
# upstream package name `notify` so `[patch.crates-io]` redirects any
# transitive graph consumers to the single workspace fork at
# `crates/tla-notify/`. Platform backends (fsevent-sys on macOS, inotify on
# Linux, kqueue on BSDs, windows-sys on Windows) remain upstream leaf deps.
notify = { path = "crates/tla-notify" }

# Testing
proptest = "1.0"
insta = "1.0"
criterion = "0.5"
# tempfile → tla-tempfile fork (Part of #4250, Tier 2 zero-dep). The crate at
# crates/tla-tempfile keeps the upstream `name = "tempfile"` so
# `[patch.crates-io]` can redirect transitive pulls (insta/proptest/rusty-fork)
# through the fork; no package alias needed at the consumer site.
tempfile = { path = "crates/tla-tempfile" }

# Tracing
tracing = "0.1"
tracing-subscriber = "0.3"

# XML parsing
# roxmltree → tla-xml fork (Part of #4250, Tier 2 zero-dep). Consumer crates
# keep `use roxmltree::*` via the `package = "tla-xml"` alias.
roxmltree = { path = "crates/tla-xml", package = "tla-xml" }

[workspace.lints.rust]
# Superset of check-cfg values across all crates (Part of #2817)
# Declaring extra values for crates that don't use them is harmless.
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(kani)',
    'cfg(feature, values("memory-stats", "im", "bumpalo", "z4"))',
] }

[workspace.lints.clippy]
# Incremental pedantic adoption — start at z4 boundary (Part of #2817)
# Crates opt in via `[lints] workspace = true` in their Cargo.toml.
pedantic = { level = "warn", priority = -1 }
# Intentional suppressions for patterns common in this codebase:
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
doc_markdown = "allow"
similar_names = "allow"
too_many_lines = "allow"
struct_excessive_bools = "allow"
unnested_or_patterns = "allow"
unreadable_literal = "allow"
return_self_not_must_use = "allow"
items_after_statements = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_lossless = "allow"
cast_possible_wrap = "allow"
if_not_else = "allow"
match_same_arms = "allow"
single_match_else = "allow"
wildcard_imports = "allow"
unused_self = "allow"
unnecessary_wraps = "allow"
manual_let_else = "allow"
match_wildcard_for_single_variants = "allow"
# API-level patterns — changing these requires coordinated refactoring:
ref_option = "allow"              # &Option<T> vs Option<&T> in public APIs
trivially_copy_pass_by_ref = "allow"  # &u64 vs u64 in signatures
needless_pass_by_value = "allow"  # pass-by-value for trait-object flexibility
iter_not_returning_iterator = "allow"  # lazy set .iter() returns custom types
iter_without_into_iter = "allow"  # iter() without IntoIterator trait impl
many_single_char_names = "allow"  # common in hashing/math code
default_trait_access = "allow"    # Default::default() vs Type::default() style
comparison_chain = "allow"        # if-else chains vs match for comparisons
implicit_hasher = "allow"         # HashSet/HashMap generalization over hashers
inline_always = "allow"           # hot-path #[inline(always)] in var_index, fingerprinting
needless_raw_string_hashes = "allow"  # widespread r#"..."# in test fixtures; mechanical fix deferred
elidable_lifetime_names = "allow"     # impl<'a> Type<'a> pattern widespread; mechanical elision deferred
uninlined_format_args = "allow"       # format!("{}", x) vs format!("{x}") — mechanical fix deferred
used_underscore_binding = "allow"     # _var used in cfg(debug_assertions) blocks
# Architectural patterns — intentional design decisions, not bugs:
result_large_err = "allow"            # CheckResult carries trace/error data; size is intentional
too_many_arguments = "allow"          # complex checker functions require many parameters
type_complexity = "allow"             # complex generic return types in checker internals
struct_field_names = "allow"          # field naming patterns (e.g. *_tags, *_state) are intentional
cast_ptr_alignment = "allow"          # intentional unsafe pointer alignment in storage/mmap layer
# Rust 1.93 new or stricter lints — defer mechanical fixes:
assigning_clones = "allow"            # clone_from() vs = .clone() — mechanical fix deferred
missing_fields_in_debug = "allow"     # manual Debug impls intentionally omit large fields
# Lints with dirty-tree instances — allow until workers commit their changes:
self_only_used_in_recursion = "allow" # recursive helper pattern; complex refactor deferred
single_match = "allow"                # if-let conversion; some in uncommitted worker code
if_same_then_else = "allow"           # some instances in uncommitted worker code
needless_lifetimes = "allow"          # explicit lifetimes in prepare.rs; mechanical elision deferred
implicit_clone = "allow"              # .to_string() on String derefs; mechanical fix deferred
redundant_closure_for_method_calls = "allow"  # |s| s.to_string() closures; mechanical fix deferred
inefficient_to_string = "allow"       # ToString on &&str; mechanical fix deferred
enum_glob_use = "allow"               # wildcard enum imports in action_runtime; mechanical fix deferred
# Additional Rust 1.93 lints — dirty-tree instances, defer until workers commit:
unnecessary_map_or = "allow"          # map_or(false, ...) → is_some_and(); mechanical fix
map_unwrap_or = "allow"               # map().unwrap_or() → map_or(); mechanical fix
explicit_into_iter_loop = "allow"     # .into_iter() in for-loop; mechanical fix
explicit_iter_loop = "allow"          # .iter() in for-loop; mechanical fix
needless_continue = "allow"           # redundant continue at end of match arm; mechanical fix
semicolon_if_nothing_returned = "allow" # missing semicolon on unit-returning statement
match_bool = "allow"                  # match on bool → if/else; mechanical fix
collapsible_else_if = "allow"         # else { if } → else if; mechanical fix
incompatible_msrv = "allow"           # Arc::unwrap_or_clone needs MSRV bump; tracked
single_char_pattern = "allow"         # .contains("x") → .contains('x'); mechanical fix
manual_assert = "allow"               # if !cond { panic!() } → assert!(); mechanical fix
unnecessary_box_returns = "allow"     # Box<T> return where T is Sized; mechanical fix
stable_sort_primitive = "allow"       # .sort() → .sort_unstable() on primitives; mechanical fix
large_stack_arrays = "allow"          # test fixtures use large inline arrays; production code is heap-allocated
borrow_as_ptr = "allow"              # &x as *const _ → addr_of!(); mechanical fix in test code

[profile.release]
# Full LTO + codegen-units=1 for maximum runtime performance.
# Build cost: ~340s link time, ~9.4GB peak LLVM memory. Worth it for
# an interpreter where every eval_dispatch cycle matters.
# DO NOT downgrade to lto="thin" or codegen-units>1 — measured 13-33%
# runtime regression across EWD998Small, MCLamportMutex, MCNanoMedium,
# MultiPaxos (binary bloat from 21.6MB to 41.6MB, reduced inlining).
lto = true
codegen-units = 1
strip = "symbols"
# panic = "unwind" is required — do NOT revert to "abort".
# Multiple production catch_unwind sites depend on this:
#   - fused.rs: 4-lane orchestrator panic recovery (#3867)
#   - precompute.rs: stack overflow catch during constant eval (#2793)
#   - run_helpers.rs: JIT compilation thread panic catch (#4018)
#   - portfolio.rs: z4-sat engine panic catch (#4026)
#   - fused.rs: cross-validation replay panic catch (#3836)
# With panic="abort", catch_unwind becomes a no-op and panics crash the process.
panic = "unwind"
overflow-checks = true

# Lightweight profile for canary gate pre-commit checks.
# Canary gates need a correct binary to verify state counts, but not
# max optimization. lto=false + codegen-units=8 compiles ~3x faster
# and uses ~5x less peak memory than the release profile.
[profile.release-canary]
inherits = "release"
lto = false
codegen-units = 8

[profile.profiling]
inherits = "release"
debug = 1
strip = "none"

[profile.dev]
# Faster builds during development
debug = 1

# Part of #4110: Agent build profile — thin LTO + 4 codegen units.
# Reduces peak memory from ~37 GB to ~10-15 GB per build.
[profile.agent]
inherits = "release"
lto = "thin"
codegen-units = 4

[profile.bench]
lto = "thin"

# Unify tmir source across tla2 and LLVM2.
# LLVM2 may use https://github.com/andrewdyates/tMIR while tla2
# uses the public tMIR source. Cargo treats different URLs as different
# crates even when the rev is the same.
[patch."ssh://git@github.com/andrewdyates/tMIR.git"]
tmir = { git = "https://github.com/andrewdyates/tMIR.git", rev = "02b4f872948b67fe61632765c31542da7166dfe4" }
tmir-build = { git = "https://github.com/andrewdyates/tMIR.git", rev = "02b4f872948b67fe61632765c31542da7166dfe4" }

# TLA2 zero-dep posture: redirect every crates.io consumer of forked crates
# (including transitive deps inside external z4, cranelift-*, regalloc2, etc)
# to the in-tree forks. Without this, e.g. `FxBuildHasher` from transitive
# crates.io rustc-hash is a different type than from the fork, and types fail
# to unify at crate boundaries (e.g. z4-chc <-> tla-aiger).
[patch.crates-io]
# Hasher stack — Tier 3 (Part of #4250)
rustc-hash = { path = "crates/tla-hash-fx" }
xxhash-rust = { path = "crates/tla-hash-xxh3" }
# fnv → tla-fnv fork (Wave 9, Part of #4250). Tiny (~200 LOC) FNV hasher used by
# petgraph, tracing, proc-macro2 (transitive). Package name stays `fnv` so
# `[patch.crates-io]` redirects every graph consumer to this fork.
fnv = { path = "crates/tla-fnv" }
# allocator-api2 → tla-allocator-api2 fork (Part of #4250, Wave 14, Tier 3
# zero-dep). Fork keeps upstream package name `allocator-api2` so this patch
# entry redirects every transitive consumer (hashbrown 0.15 and any crate
# using the stable Allocator trait mirror) to the single in-workspace copy.
# Umbrella-only — upstream is a single lib crate with no sub-crates.
allocator-api2 = { path = "crates/tla-allocator-api2" }
# Number stack — Tier 2 (Part of #4250)
num-bigint = { path = "crates/tla-bignum/bigint" }
num-integer = { path = "crates/tla-bignum/integer" }
num-traits = { path = "crates/tla-bignum/traits" }
# bincode → tla-bincode fork (Part of #4250, Wave 64). Binary encoder/decoder.
# Fork keeps `package = "bincode"` so every transitive consumer redirects here.
bincode = { path = "crates/tla-bincode" }
# bstr → tla-bstr fork (Part of #4250, Wave 64). Byte string type and utilities.
# Fork keeps `package = "bstr"` so every transitive consumer redirects here.
bstr = { path = "crates/tla-bstr" }
# bit_field → tla-bit-field fork (Part of #4250, Wave 65 zero-dep). Trait
# for setting and getting ranges of bits. Fork keeps `package = "bit_field"`
# for patch-by-name.
bit_field = { path = "crates/tla-bit-field" }
# bit-set → tla-bit-set fork (Part of #4250, Wave 15 zero-dep). Small
# bitset library; sole runtime dep is bit-vec (also being forked).
# Fork keeps `package = "bit-set"` for patch-by-name.
bit-set = { path = "crates/tla-bit-set" }
# roxmltree → tla-xml fork (Part of #4250, Tier 2 zero-dep). Redirects any
# transitive crates.io consumer to the in-workspace fork. The fork crate is
# named `tla-xml` on disk; `package = "tla-xml"` tells cargo the substitute
# has a different name than the patched key.
roxmltree = { path = "crates/tla-xml", package = "tla-xml" }
# tempfile + minilp forks — Tier 2 (Part of #4250)
tempfile = { path = "crates/tla-tempfile" }
minilp = { path = "crates/tla-minilp" }
# cast → tla-cast fork (Part of #4250, Wave 14, Tier 3 zero-dep). Verbatim fork
