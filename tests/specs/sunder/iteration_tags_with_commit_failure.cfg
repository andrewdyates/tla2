\* TLC configuration for iteration_tags_with_commit_failure.tla
\* Author: Andrew Yates <andrewyates.name@gmail.com>
\*
\* Run with: tlc -workers auto iteration_tags_with_commit_failure.tla -config iteration_tags_with_commit_failure.cfg

\* Constants - small values for model checking
\* Note: None is a model value distinct from all Sessions
CONSTANTS
    None = None
    Sessions = {1, 2, 3}
    MaxIteration = 10
    MaxSteps = 30
    MaxCommitAttempts = 2

\* Check the specification
SPECIFICATION Spec

\* Invariants to verify (safety properties)
\* NOTE: GapDetection is expected to FAIL - that's the bug we're demonstrating!
INVARIANTS
    TypeOK
    LockMutex
    UniqueIterations
    HolderConsistency
    ValidAssignments
    AssignmentConsistency
    \* GapDetection   \* Uncomment to see the gap violation

\* To verify the gap bug exists, uncomment GapDetection
\* The model checker should find a trace where:
\* 1. Session 1 gets iteration 1, writes to tagFile, enters "committing"
\* 2. Session 1 fails all commit retries, enters "failed"
\* 3. Session 2 gets iteration 2 (from tagFile=1+1=2), succeeds
\* Now gitHistory = {2}, but iteration 1 is missing!

\* Liveness properties (require fairness, check with FairSpec)
\* PROPERTIES
\*     EventualTermination
\*     LockProgress
\*     CommitProgress
