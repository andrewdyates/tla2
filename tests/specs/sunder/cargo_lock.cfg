\* TLC configuration for cargo_lock.tla
\* Author: Andrew Yates <andrewyates.name@gmail.com>
\*
\* Run with: tlc -workers auto cargo_lock.tla -config cargo_lock.cfg

\* Constants - small values for model checking
\* Note: None is a model value distinct from all Procs
CONSTANTS
    None = None
    Procs = {1, 2, 3}
    MaxSteps = 20

\* Check the specification
SPECIFICATION Spec

\* Invariants to verify (safety properties)
INVARIANTS
    TypeOK
    MutualExclusion
    LockConsistency
    HolderMatchesLock
    NoPhantomHolding

\* Liveness properties (require fairness, check with FairSpec)
\* PROPERTIES
\*     Progress
\*     EventualAcquire
