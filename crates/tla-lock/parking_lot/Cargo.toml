[package]
name = "tla-lock"
version.workspace = true
edition.workspace = true
license.workspace = true
authors = [
    "Andrew Yates",
    "Amanieu d'Antras <amanieu@gmail.com>",
]
description = "Vendored fork of parking_lot 0.12.5 (efficient synchronization primitives). Tier 3 zero-dep: bundles lock_api + parking_lot_core."
repository = "https://github.com/andrewdyates/tla2"
rust-version = "1.71"

[lib]
name = "parking_lot"
path = "src/lib.rs"

[features]
default = []
arc_lock = ["lock_api/arc_lock"]
deadlock_detection = ["parking_lot_core/deadlock_detection"]
hardware-lock-elision = []
nightly = ["parking_lot_core/nightly", "lock_api/nightly"]
owning_ref = ["lock_api/owning_ref"]
send_guard = []
serde = ["lock_api/serde"]

[dependencies]
lock_api = { package = "tla-lock-api", path = "../lock_api" }
parking_lot_core = { package = "tla-lock-core", path = "../parking_lot_core" }

[dev-dependencies]
bincode = "1.3.3"
rand = "0.8.3"

[[test]]
name = "issue_203"
path = "tests/issue_203.rs"

[[test]]
name = "issue_392"
path = "tests/issue_392.rs"
