\* Configuration for ParallelModelChecker.tla
\* Small model for quick verification

\* Workers: 2 parallel workers
CONSTANTS
    Workers = {1, 2}

    \* Small state space: linear chain s1 -> s2 -> s3 -> s4
    States = {s1, s2, s3, s4}
    InitStates = {s1}

    \* Successor function (as a TLA+ function literal)
    \* s1 -> {s2, s3}  (branching)
    \* s2 -> {s4}
    \* s3 -> {s4}
    \* s4 -> {}        (terminal)
    Successors = [s \in {s1, s2, s3, s4} |->
        CASE s = s1 -> {s2, s3}
          [] s = s2 -> {s4}
          [] s = s3 -> {s4}
          [] s = s4 -> {}
    ]

    \* No deadlock states in this test
    Deadlocks = {}

    \* NULL symbol
    NULL = "null"

SPECIFICATION Spec

\* Check type invariant
INVARIANT TypeOK

\* Check safety properties
INVARIANT WorkAccountingCorrect
INVARIANT ActiveWorkersBounded

\* These properties checked at end state
PROPERTY CompleteExploration
