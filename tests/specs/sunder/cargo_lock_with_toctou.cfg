\* TLC configuration for cargo_lock_with_toctou.tla
\* Author: Andrew Yates <andrewyates.name@gmail.com>
\*
\* Run with: tlc -workers auto cargo_lock_with_toctou.tla -config cargo_lock_with_toctou.cfg

\* Constants - small values for model checking
\* Note: None is a model value distinct from all Procs
CONSTANTS
    None = None
    Procs = {1, 2}
    MaxSteps = 25
    StartTimeTolerance = 2

\* Check the specification
SPECIFICATION Spec

\* Invariants to verify (safety properties)
\* NOTE: This spec is designed to FIND TOCTOU bugs. The following invariants
\* WILL be violated when the TOCTOU race occurs:
\*   - HolderMatchesLock: violated when another process force-releases our lock
\*   - NoPhantomHolding: violated when lockFile cleared while we're "holding"
\*   - NoIncorrectForceRelease: violated when we force-release a non-stale lock
\*
\* Only TypeOK, MutualExclusion, and LockConsistency should pass.
INVARIANTS
    TypeOK
    MutualExclusion
    LockConsistency
    \* HolderMatchesLock      \* EXPECTED TO FAIL - TOCTOU bug
    \* NoPhantomHolding       \* EXPECTED TO FAIL - TOCTOU bug
    \* NoIncorrectForceRelease  \* EXPECTED TO FAIL - TOCTOU bug

\* To see the TOCTOU bug trace, uncomment one of the safety invariants above.
\* The model checker will find a counterexample showing:
\* 1. Process 1 acquires lock
\* 2. Process 2 fails acquire, begins stale check (reads PID 1)
\* 3. Process 1 releases lock and dies
\* 4. Process 2 sees process 1 dead, enters "releasing" state
\* 5. Process 1 respawns, acquires lock again
\* 6. Process 2 completes force-release, breaking process 1's lock!

\* Liveness properties (require fairness, check with FairSpec)
\* PROPERTIES
\*     Progress
\*     EventualAcquire
