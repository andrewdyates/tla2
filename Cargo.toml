    "crates/tla-crossbeam",
    # Tier 2 zero-dep: vendored notify 6.1.1 (cross-platform filesystem watcher).
    # Platform backends (fsevent-sys, inotify, kqueue, windows-sys) remain as
    # external leaf deps wrapping platform syscalls. Consumer: tla-cli (watch).
    "crates/tla-notify",
    # Tier 2 zero-dep: verbatim fork of rand 0.8.6 umbrella crate (Part of #4250).
    # Consumers: tla-check, tla-eval, tla-petri, tla-aiger (random simulation).
    # Subtree crates (rand_core, rand_chacha, rand_hc, getrandom, ppv-lite86) remain
    # external leaf deps — scope-limited fork.
    "crates/tla-rand",
    # Wave 36 zero-dep (Part of #4250): umbrella-only fork of rand_core 0.9.5
