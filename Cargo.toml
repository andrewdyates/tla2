    # crate is forked; its leaf deps (proc-macro2, quote, unicode-ident) are
    # already forked in earlier waves and consumed via workspace-level
    # [patch.crates-io]. Package name stays `syn` so `[patch.crates-io]`
    # redirects every transitive consumer to this single in-tree copy.
    # Part of #4250 zero-external-dep posture.
    "crates/tla-syn",
    # Tier 3 zero-dep: vendored icu_properties 2.2.0 (Unicode-3.0) — ICU4X
    # Unicode property tables + lookup APIs. Umbrella-only scope: only the
    # icu_properties crate itself is forked; its ICU4X sub-deps
    # (icu_collections, icu_locale_core, icu_provider, icu_properties_data,
    # zerovec, zerotrie, ...) remain external leaf deps. Package name stays
    # `icu_properties` so `[patch.crates-io]` redirects every transitive
    # consumer to the single in-tree fork. Part of #4250 Wave 26.
    "crates/tla-icu-properties",
    # Tier 2 zero-dep: vendored crossbeam umbrella crate (Part of #4250).
    # Scope-limited: only the `crossbeam` facade is forked; its subtree
    # crates (crossbeam-channel, crossbeam-deque, crossbeam-epoch,
