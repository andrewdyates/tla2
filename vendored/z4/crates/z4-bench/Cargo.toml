[package]
name = "z4-bench"
description = "Competition-standard benchmarking CLI for Z4 SMT solver"
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"

[[bin]]
name = "z4-bench"
path = "src/main.rs"

[dependencies]
anyhow = "1"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
clap = { version = "4", features = ["derive"] }