[package]
# Keep the upstream crate name so `[patch.crates-io]` can redirect the
# dep graph through this fork without a `package =` rename at every
# consumer site. The tla2 workspace family name is `tla-dashmap`; the
# directory carries that identity while the package name stays `dashmap`.
name = "dashmap"
version = "6.1.0"
edition = "2018"
license = "MIT"
repository = "https://github.com/andrewdyates/tla2"
rust-version = "1.65"
authors = [
    "Andrew Yates <ayates@dropbox.com>",
    "Acrimon <joel.wejdenstal@gmail.com>",
]
description = "TLA2 verbatim fork of dashmap 6.1.0 (MIT). Part of #4250 Tier 2 zero-external-dep posture. Consumers import `use dashmap::*` unchanged via `[patch.crates-io]` redirection. Blazing fast concurrent HashMap for Rust."
homepage = "https://github.com/xacrimon/dashmap"
keywords = ["atomic", "concurrent", "hashmap"]
categories = ["concurrency", "algorithms", "data-structures"]
readme = "README.md"
documentation = "https://docs.rs/dashmap"

# Verbatim fork of dashmap 6.1.0.
# Upstream: https://github.com/xacrimon/dashmap (tag v6.1.0)
# Original license: MIT (preserved in LICENSE).
# The fork keeps the upstream public module layout (`dashmap::DashMap`,
# `dashmap::DashSet`, etc.) so the workspace can redirect this crate via
# `[patch.crates-io] dashmap = { path = "crates/tla-dashmap" }` with zero
# source changes at consumer sites (tla-check, tla-eval, tla-codegen, tla-jit).
#
# Remaining crates.io leaf deps (hashbrown, lock_api, parking_lot_core,
# cfg-if, once_cell, crossbeam-utils, serde, rayon, arbitrary, typesize) are
# left external for now — forking them inline would defeat the purpose or
# pull in deeper dep chains. They can be separately forked later if needed.

[lib]
name = "dashmap"
path = "src/lib.rs"

[features]
raw-api = []
typesize = ["dep:typesize"]
inline = ["hashbrown/inline-more"]

[dependencies]
lock_api = "0.4.10"
parking_lot_core = "0.9.8"
hashbrown = { version = "0.14.0", default-features = false, features = ["raw"] }
serde = { version = "1.0.188", optional = true, features = ["derive"] }
cfg-if = "1.0.0"
rayon = { version = "1.7.0", optional = true }
once_cell = "1.18.0"
arbitrary = { version = "1.3.0", optional = true }
crossbeam-utils = "0.8"
typesize = { version = "0.1.8", default-features = false, optional = true }

[package.metadata.docs.rs]
features = ["rayon", "raw-api", "serde"]

# NOTE: We intentionally do NOT apply the workspace pedantic lints here.
# This is a verbatim upstream fork; enabling pedantic lints would generate
# hundreds of warnings on code we did not write.
