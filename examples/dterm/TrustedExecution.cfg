\* TrustedExecution.cfg - TLC configuration for simulation mode
\* Quick verification suitable for CI smoke testing

\* Model values - tuned for CI (~3 seconds on 16 cores)
CONSTANTS
    MaxSteps = 3
    MaxSnapshots = 3
    TimingThreshold = 2
    MaxClock = 6
    MaxHash = 4

\* Initial state and next-state relation
INIT Init
NEXT Next

\* Verify invariants
INVARIANTS
    TypeInvariant
    SafetyInvariant
    ExecutionNoDeadlock

\* State constraint for bounded model checking
CONSTRAINT
    StateConstraint

\* Note: Temporal properties (EventualTermination) require SPECIFICATION
\* with fairness constraints. Use FairSpec for full liveness verification.
