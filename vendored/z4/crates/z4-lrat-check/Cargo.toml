[package]
name = "z4-lrat-check"
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/andrewdyates/z4"
homepage = "https://github.com/andrewdyates/z4"
authors = ["Andrew Yates <andrewyates.name@gmail.com>"]
documentation = "https://docs.rs/z4-lrat-check"
description = "Standalone LRAT proof checker for SAT Competition"
readme = "README.md"

[lib]
name = "z4_lrat_check"
path = "src/lib.rs"

[[bin]]
name = "z4-lrat-check"
path = "src/main.rs"

[dependencies]
thiserror = { version = "2.0" }
z4-proof-common = { version = "0.9.0", path = "../z4-proof-common" }
[dev-dependencies]
proptest = { version = "1.5" }


