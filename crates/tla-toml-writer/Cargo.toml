[package]
edition = "2024"
rust-version = "1.85"
name = "toml_writer"
version = "1.1.1+spec-1.1.0"
description = "A low-level interface for writing out TOML"
readme = "README.md"
keywords = [
    "encoding",
    "toml",
    "no_std",
]
categories = ["encoding"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/toml-rs/toml"

[features]
alloc = []
default = ["std"]
std = ["alloc"]

[lib]
name = "toml_writer"
path = "src/lib.rs"

[dependencies]
