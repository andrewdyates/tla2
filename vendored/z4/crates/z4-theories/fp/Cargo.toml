[package]
name = "z4-fp"
description = "Floating-point theory solver for Z4"
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/andrewdyates/z4"
readme = "README.md"



[dependencies]
z4-core = { version = "0.9.0", path = "../../z4-core" }
z4-bv = { version = "0.9.0", path = "../bv" }
z4-lra = { version = "0.9.0", path = "../lra" }
hashbrown = "0.15"
tracing = "0.1"
num-bigint = "0.4"
num-rational = "0.4"
[dev-dependencies]
proptest = "1.5"
z4-sat = { version = "0.9.0", path = "../../z4-sat" }