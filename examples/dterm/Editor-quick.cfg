\* TLC Model Checking Configuration for Editor.tla (reduced bounds)
\*
\* This config uses reduced constants but still exercises multi-line behavior.
\* With the current Editor.tla group-change abstraction, this configuration is
\* tractable for exhaustive TLC checking (example run: 4,458,766 states generated).
\*
\* For CI smoke tests, consider simulation mode instead:
\*   java -jar tla2tools.jar -simulate num=10000 -config Editor-quick.cfg Editor.tla
\*
\* See issue #127 and reports/research/2026-01-18-tla-state-space-estimation.md

SPECIFICATION Spec

\* Reduced constants
CONSTANTS
    MaxLines = 2
    MaxLineLen = 3
    MaxUndoDepth = 1
    MaxGroupDepth = 1
    MaxChangeSize = 1

\* Safety invariants to verify
\* Note: TypeInvariant omitted - sequence bounds cause exponential state space growth.
\* The bound is correct; checking it is expensive. See issue #127 for state space analysis.
INVARIANTS
    Safety
    CursorValid
    GroupDepthNonNegative

\* Temporal properties
PROPERTIES
    UndoRedoSymmetric
    GroupingBalanced
    SaveClearsModified
