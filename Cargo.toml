    # Scope: ONLY the top-level rand_core crate. Companion RNG backend crates
    # (rand_chacha, rand_hc, rand_xorshift, rand_pcg) stay external.
    "crates/tla-rand-core",
    # Tier 2 zero-dep: vendored logos lexer generator (Part of #4250).
    # Three-crate stack (runtime + proc-macro shim + codegen) keeps upstream
