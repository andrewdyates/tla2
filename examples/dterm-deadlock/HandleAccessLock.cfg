\* TLA+ Model Checking Configuration for HandleAccessLock
\* Run with: tlc HandleAccessLock.tla -config HandleAccessLock.cfg

\* Use FairSpec (Spec + weak fairness) so liveness properties are checkable.
SPECIFICATION FairSpec

\* We want TLC to find the deadlock state, so enable deadlock checking.
\* But our spec uses bounded ops, so threads legitimately stop — use NoDeadlock invariant instead.
CHECK_DEADLOCK FALSE

\* Small constants for tractable state space:
CONSTANTS
    MaxPaletteOps = 2
    MaxProcessCalls = 2
    SwiftLockRecursive = FALSE

\* Invariants to check (safety)
INVARIANTS
    SwiftLockConsistent
    RwLockConsistent
    LockOrderPreserved
    NoDeadlock

\* Liveness properties (require FairSpec)
PROPERTIES
    MainEventuallyIdle
    IOEventuallyIdle
