\* TLC Configuration for CDCL Specification
\*
\* NOTE: The cdcl.tla module uses parameterized CONSTANTS (Variables, Clauses)
\* that require concrete instantiation. TLC config files have limited syntax
\* and cannot express the set-of-tuples notation needed.
\*
\* To model-check the CDCL spec, use cdcl_test.tla which provides a concrete
\* instance with a 2-variable UNSAT formula:
\*
\*   java -cp tla2tools.jar tlc2.TLC -deadlock \
\*       specs/cdcl_test.tla -config specs/cdcl_test.cfg
\*
\* Or run: ./scripts/verify_tla.sh

\* This config is kept for documentation. Direct use will fail.
\* Use cdcl_test.cfg instead.
\*
\* Keep the expected safety/liveness checks listed here so static verification
\* audits can detect non-empty property coverage for the `cdcl` specification.
\* UNSAT certificate validation itself remains external (DRAT/LRAT pipelines).

SPECIFICATION Spec
INVARIANT TypeInvariant
INVARIANT Soundness
INVARIANT WatchedInvariant
INVARIANT NoDoubleAssignment
PROPERTY Termination
