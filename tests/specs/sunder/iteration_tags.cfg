\* TLC configuration for iteration_tags.tla
\* Author: Andrew Yates <andrewyates.name@gmail.com>
\*
\* Run with: tlc -workers auto iteration_tags.tla -config iteration_tags.cfg

\* Constants - small values for model checking
\* Note: None is a model value distinct from all Sessions
CONSTANTS
    None = None
    Sessions = {1, 2, 3}
    MaxIteration = 10
    MaxSteps = 25

\* Check the specification
SPECIFICATION Spec

\* Invariants to verify (safety properties)
INVARIANTS
    TypeOK
    LockMutex
    UniqueIterations
    HolderConsistency
    ValidAssignments

\* Liveness properties (require fairness, check with FairSpec)
\* PROPERTIES
\*     EventualTermination
\*     LockProgress
