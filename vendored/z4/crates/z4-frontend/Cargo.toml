[package]
name = "z4-frontend"
description = "SMT-LIB 2.6 parser and preprocessor for Z4"
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/andrewdyates/z4"
readme = "README.md"

[dependencies]
z4-core = { version = "0.9.0", path = "../z4-core" }
logos = { version = "0.15", path = "../../../logos-0.15" }
hashbrown = "0.15"
thiserror = "2.0"
num-bigint = "0.4"
num-rational = "0.4"
stacker = "0.1.22"
[dev-dependencies]
proptest = "1.5"