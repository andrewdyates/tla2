# Andrew Yates <ayates@dropbox.com>
# TLA2 verbatim fork of yoke 0.8.2 (Unicode-3.0).
# Part of #4250 Wave 27 zero-external-dep posture.
#
# Upstream: https://github.com/unicode-org/icu4x (yoke 0.8.2)
# Original license: Unicode-3.0 (preserved in LICENSE).
#
# Umbrella-only fork: ONLY the top-level `yoke` crate is vendored.
# Sub-dependencies (yoke-derive, zerofrom, stable_deref_trait, serde) remain
# external leaf deps. They can be separately forked later if needed for full
# Tier 1 posture. The proc-macro sub-crate `yoke-derive` is not vendored —
# consumers enabling the `derive` feature pull it from crates.io (compile-
# time expansion only, zero runtime footprint).
#
# Keep the upstream crate name `yoke` so `[patch.crates-io]` can
# redirect the dep graph through this fork without a `package =` rename
# at every consumer site. The tla2 workspace family name is `tla-yoke`;
# the directory carries that identity while the package name stays `yoke`.
#
# Transitive consumer chain: zerovec -> icu_* -> idna_adapter -> idna -> url.

[package]
name = "yoke"
version = "0.8.2"
edition = "2021"
rust-version = "1.82"
license = "Unicode-3.0"
authors = [
    "Andrew Yates <ayates@dropbox.com>",
    "Manish Goregaokar <manishsmail@gmail.com>",
]
description = "TLA2 verbatim fork of yoke 0.8.2 (Unicode-3.0). Part of #4250 Wave 27 zero-external-dep posture. Abstraction allowing borrowed data to be carried along with the backing data it borrows from. Consumers import `use yoke::*` unchanged via `[patch.crates-io]` redirection."
homepage = "https://github.com/andrewdyates/tla2"
repository = "https://github.com/andrewdyates/tla2"
keywords = [
    "zero-copy",
    "serialization",
    "memory-efficiency",
    "self-referential",
]
categories = [
    "data-structures",
    "memory-management",
    "caching",
    "no-std",
]
readme = "README.md"

[package.metadata.docs.rs]
all-features = true

[lib]
name = "yoke"
path = "src/lib.rs"

[[test]]
name = "bincode"
path = "tests/bincode.rs"

[[test]]
name = "miri"
path = "tests/miri.rs"

[features]
alloc = [
    "stable_deref_trait/alloc",
    "zerofrom/alloc",
]
default = [
    "alloc",
    "zerofrom",
]
derive = [
    "dep:yoke-derive",
    "zerofrom/derive",
]
serde = []
zerofrom = ["dep:zerofrom"]

[dependencies]
stable_deref_trait = { version = "1.2.0", default-features = false }
yoke-derive = { version = "0.8.2", optional = true, default-features = false }
zerofrom = { version = "0.1.6", optional = true, default-features = false }

[dev-dependencies]
bincode = "1.3.1"
postcard = { version = "1.0.3", default-features = false }
serde = { version = "1.0.220", default-features = false }

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    "cfg(icu4c_enable_renaming)",
    "cfg(needs_alloc_error_handler)",
    "cfg(icu4x_run_size_tests)",
    "cfg(icu4x_unstable_fast_trie_only)",
]
