[package]
edition = "2018"
rust-version = "1.77.0"
name = "borsh"
version = "1.6.1"
authors = ["Near Inc <hello@near.org>"]
build = "build.rs"
exclude = ["*.snap"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Binary Object Representation Serializer for Hashing
"""
homepage = "https://borsh.io"
readme = "README.md"
categories = [
    "encoding",
    "network-programming",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/near/borsh-rs"

[package.metadata.docs.rs]
features = ["rc"]
targets = ["x86_64-unknown-linux-gnu"]

[features]
de_strict_order = []
default = ["std"]
rc = []
std = ["bytes?/std"]
# derive / unstable__schema features dropped in the tla-borsh fork (Part of #4250):
# enabling borsh-derive introduced a cycle (indexmap → borsh → borsh-derive →
# proc-macro-crate → toml_edit → indexmap), same pattern as tla-bit-vec. The
# derive feature is not used by TLA2 — only the umbrella serializer is consumed
# transitively. Same umbrella-only scope applied to thiserror (Wave 33) keeps
# proc-macro companion crates external as leaf deps.

[lib]
name = "borsh"
path = "src/lib.rs"

# Bin/example/tests targets dropped in tla-borsh fork (Part of #4250): they
# required the `derive` / `unstable__schema` features which depend on
# borsh-derive and cannot be enabled here (feature removed — see [features]
# comment above to break the indexmap cycle). Library compile is all we need.

# Optional bson and indexmap deps dropped in tla-borsh fork (Part of #4250):
# bson pulls indexmap transitively, and indexmap's workspace fork
# (tla-indexmap) has its own optional `borsh` dep for backward compat — this
# creates a cycle (borsh -> bson/indexmap -> tla-indexmap -> borsh). These
# features are unused by TLA2; removing them breaks the cycle. Same pattern
# used for borsh-derive removal above and for tla-bit-vec.
#
# Remaining optional deps (ascii, bytes, hashbrown) do not cycle and can stay.
[dependencies.ascii]
version = "1.1"
optional = true

[dependencies.bytes]
version = "1"
optional = true
default-features = false

[dependencies.hashbrown]
version = ">=0.11,<0.16.0"
optional = true

[dev-dependencies.insta]
version = "1.29.0"

[dev-dependencies.serde_json]
version = "1"

[build-dependencies.cfg_aliases]
version = "0.2.1"
