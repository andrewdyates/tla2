[package]
name = "z4-sat"
description = "CDCL SAT solver core for Z4"
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/andrewdyates/z4"
readme = "README.md"



[features]
default = ["unsafe-bcp", "jit"]
# Experimental: Enable Phase 7 GPU compute infrastructure (removed: wgpu vendoring too heavy)
# gpu = ["dep:wgpu", "dep:pollster"]
# CaDiCaL-exact raw pointer watch-list traversal (~2x BCP throughput)
unsafe-bcp = []
# Experimental: JIT-compile static clauses into native BCP via Cranelift
jit = ["dep:z4-jit"]

[dependencies]
z4-core = { version = "0.9.0", path = "../z4-core" }
z4-drat-check = { version = "0.9.0", path = "../z4-drat-check" }
z4-proof-common = { version = "0.9.0", path = "../z4-proof-common" }
z4-prefetch = { version = "0.9.0", path = "../z4-prefetch" }
hashbrown = "0.15"
tracing = "0.1"
serde_json = "1"
thiserror = "2.0"
bytemuck = { version = "1", features = ["derive"] }
smallvec = "1.13"
# pollster/wgpu removed — gpu feature disabled in vendored copy
z4-jit = { path = "../z4-jit", optional = true }

[dev-dependencies]
criterion = "0.5"
proptest = "1.5"
ntest = "0.9"
tempfile = "3.14"
parking_lot = "0.12"
wait-timeout = "0.2.1"
z4-lrat-check = { version = "0.9.0", path = "../z4-lrat-check" }
z4-tla-bridge = { version = "0.9.0", path = "../z4-tla-bridge" }
[[bench]]
name = "sat_bench"
harness = false
