[package]
name = "z4-chc"
version = "0.9.0"
edition = "2021"
description = "CHC (Constrained Horn Clause) solver using PDR/IC3"
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/andrewdyates/z4"

[features]
benchmark_matrix_tests = []

[dependencies]
z4-core = { version = "0.9.0", path = "../z4-core" }
z4-sat = { version = "0.9.0", path = "../z4-sat" }
z4-bv = { version = "0.9.0", path = "../z4-theories/bv" }
hashbrown = "0.15"
z4-lia = { version = "0.9.0", path = "../z4-theories/lia" }
z4-arrays = { version = "0.9.0", path = "../z4-theories/arrays" }
z4-euf = { version = "0.9.0", path = "../z4-theories/euf" }
z4-dpll = { version = "0.9.0", path = "../z4-dpll" }
z4-frontend = { version = "0.9.0", path = "../z4-frontend" }
thiserror = "2.0"
rustc-hash = "2.1"
tracing = "0.1"
serde_json = "1"
stacker = "0.1.22"
num-bigint = "0.4"
num-integer = "0.1"
num-rational = "0.4"
num-traits = "0.2"
[dev-dependencies]
proptest = "1.5"
ntest = "0.9"
serial_test = "3.2"
tempfile = "3.14"
wait-timeout = "0.2.1"
z4-tla-bridge = { version = "0.9.0", path = "../z4-tla-bridge" }