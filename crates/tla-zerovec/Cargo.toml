# Andrew Yates <ayates@dropbox.com>
# TLA2 verbatim fork of zerovec 0.11.6 (Unicode-3.0).
# Part of #4250 Wave 26 zero-external-dep posture.
#
# Upstream: https://github.com/unicode-org/icu4x (zerovec 0.11.6)
# Original license: Unicode-3.0 (preserved in LICENSE).
#
# Umbrella-only fork: ONLY the top-level `zerovec` crate is vendored.
# Sub-dependencies (yoke, zerofrom, zerovec-derive, twox-hash, schemars,
# databake, serde) remain external leaf deps. They can be separately
# forked later if needed for full Tier 1 posture.
#
# Keep the upstream crate name `zerovec` so `[patch.crates-io]` can
# redirect the dep graph through this fork without a `package =` rename
# at every consumer site. The tla2 workspace family name is `tla-zerovec`;
# the directory carries that identity while the package name stays `zerovec`.

[package]
name = "zerovec"
version = "0.11.6"
edition = "2021"
rust-version = "1.83"
license = "Unicode-3.0"
authors = [
    "Andrew Yates <ayates@dropbox.com>",
    "The ICU4X Project Developers",
]
description = "TLA2 verbatim fork of zerovec 0.11.6 (Unicode-3.0). Part of #4250 Wave 26 zero-external-dep posture. Zero-copy vector backed by a byte array. Consumers import `use zerovec::*` unchanged via `[patch.crates-io]` redirection."
homepage = "https://github.com/andrewdyates/tla2"
repository = "https://github.com/andrewdyates/tla2"
keywords = ["zero-copy", "serialization", "memory-efficiency", "serde"]
categories = [
    "rust-patterns",
    "memory-management",
    "caching",
    "no-std",
    "data-structures",
]
readme = "README.md"

[package.metadata.docs.rs]
all-features = true

[lib]
name = "zerovec"
path = "src/lib.rs"
bench = false

[features]
alloc = ["serde?/alloc"]
databake = ["dep:databake"]
derive = ["dep:zerovec-derive"]
hashmap = ["dep:twox-hash", "alloc"]
schemars = ["dep:schemars", "alloc"]
serde = ["dep:serde"]
std = []
yoke = ["dep:yoke"]

[dependencies]
databake = { version = "0.2.0", features = ["derive"], optional = true, default-features = false }
schemars = { version = "1.0.4", optional = true, default-features = false }
serde = { version = "1.0.220", features = ["derive"], optional = true, default-features = false }
twox-hash = { version = "2.0.0", features = ["xxhash64"], optional = true, default-features = false }
yoke = { version = "0.8.2", optional = true, default-features = false }
zerofrom = { version = "0.1.6", default-features = false }
zerovec-derive = { version = "0.11.3", optional = true, default-features = false }

[dev-dependencies]
bincode = "1.3.1"
postcard = { version = "1.0.3", features = ["use-std"], default-features = false }
serde = { version = "1.0.220", features = ["derive"], default-features = false }
serde_json = "1.0.45"
yoke = { version = "0.8.2", features = ["derive"], default-features = false }

[lints.clippy]
alloc-instead-of-core = "warn"
branches-sharing-code = "warn"
collection_is_never_read = "warn"
crosspointer_transmute = "warn"
dbg_macro = "warn"
debug_assert_with_mut_call = "warn"
doc_markdown = "warn"
exhaustive_enums = "deny"
exhaustive_structs = "deny"
fn_to_numeric_cast_any = "warn"
infinite_loop = "warn"
large_stack_arrays = "warn"
mismatching_type_param_order = "warn"
missing_fields_in_debug = "warn"
missing_transmute_annotations = "warn"
negative_feature_names = "warn"
or-fun-call = "warn"
same_functions_in_if_condition = "warn"
todo = "warn"
transmute_bytes_to_str = "warn"
transmute_int_to_bool = "warn"
transmute_int_to_non_zero = "warn"
transmute_ptr_to_ptr = "warn"
transmute_ptr_to_ref = "warn"
transmute_undefined_repr = "warn"
transmutes_expressible_as_ptr_casts = "warn"
trivially_copy_pass_by_ref = "deny"
unnecessary-wraps = "warn"
useless_transmute = "warn"
wildcard_dependencies = "warn"

[lints.rust]
missing_debug_implementations = "deny"
trivial_numeric_casts = "deny"
unused_lifetimes = "warn"
unused_macro_rules = "warn"
unused_qualifications = "warn"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    "cfg(icu4c_enable_renaming)",
    "cfg(needs_alloc_error_handler)",
    "cfg(icu4x_run_size_tests)",
    "cfg(icu4x_unstable_fast_trie_only)",
]
