[package]
name = "tla-lock-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors = [
    "Andrew Yates",
    "Amanieu d'Antras <amanieu@gmail.com>",
]
description = "Vendored fork of parking_lot_core 0.9.12 (low-level parking/unparking primitives). Part of tla-lock (Tier 3 zero-dep)."
repository = "https://github.com/andrewdyates/tla2"
rust-version = "1.71.0"
build = "build.rs"

[lib]
name = "parking_lot_core"
path = "src/lib.rs"

[features]
deadlock_detection = ["petgraph", "backtrace"]
nightly = []

[dependencies]
cfg-if = "1.0.0"
smallvec = "1.6.1"
backtrace = { version = "0.3.60", optional = true }
petgraph = { version = "0.6.0", optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2.95"

[target.'cfg(target_os = "redox")'.dependencies]
redox_syscall = "0.5"

[target.'cfg(windows)'.dependencies]
windows-link = "0.2.0"
