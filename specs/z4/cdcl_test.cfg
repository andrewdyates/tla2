\* TLC Config for cdcl_test
\* Run: ./scripts/verify_tla.sh (recommended)
\* Or manually: java -cp /path/to/tla2tools.jar tlc2.TLC specs/cdcl_test.tla -config specs/cdcl_test.cfg
\*
\* cdcl_test.tla includes TerminalStutter, so TLC can run with or without -deadlock.
\* Soundness here is trace-structural; full UNSAT proof validity is verified
\* externally by DRAT/LRAT checks in the Rust verification pipeline.

CONSTANTS
    NumVars = 2
    MaxLearnedClauses = 4

SPECIFICATION Spec

INVARIANT TypeInvariant
INVARIANT Soundness
INVARIANT NoTrailDuplicates

CONSTRAINT LearnedClausesBound
