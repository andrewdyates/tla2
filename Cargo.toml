    # proc-macro2 / quote / syn remain external leaf deps (compile-time only).
    "crates/tla-auto-impl",
    # Wave 11 zero-dep: vendored beef 0.5.2 (MIT OR Apache-2.0) — faster/compact Cow.
    # Consumers: logos + other parsing crates (transitive). Pure library, zero
