SPECIFICATION Spec

CONSTANTS
    VALUES = {1, 2, 3}
    MAX_LEN = 5

INVARIANTS
    TypeInv
    SortedOutput
    PermutationCorrect
    ResultWellFormed
    RunIndexesCorrect
    LinearSpaceOutput
    RunsBounded

\* Liveness (PROPERTIES Termination) removed -- activates full-state storage
\* mode in TLC/tla2, causing timeout at 120s. Safety invariants above are
\* sufficient for VerifyThis scoring. See also DllToBst.cfg.
