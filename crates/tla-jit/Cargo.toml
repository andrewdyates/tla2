[package]
name = "tla-jit"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "TLA2 JIT compiler using Cranelift"
readme.workspace = true

[dependencies]
tla-core = { path = "../tla-core" }
# tla-jit-abi — canonical source for the pure-data ABI types consumed by both
# Cranelift (tla-jit) and LLVM2 (tla-llvm2) backends. Includes the liveness
# predicate descriptors re-exported from `compiled_liveness`. Part of #4267.
tla-jit-abi.workspace = true
tla-jit-runtime = { path = "../tla-jit-runtime" }
tla-tir = { path = "../tla-tir" }
tla-value = { path = "../tla-value" }

# Native code generation backend
tla-codegen-backend = { path = "../tla-codegen-backend", default-features = false, features = ["std", "host-arch"] }
tla-codegen-frontend = { path = "../tla-codegen-frontend" }
libc = "0.2"

# Error handling
thiserror.workspace = true

# Hashing
xxhash-rust = { workspace = true }  # xxh3 SIMD fingerprinting (forked: crates/tla-hash-xxh3, Part of #3987)

# Data structures
num-bigint.workspace = true
num-traits.workspace = true
rustc-hash.workspace = true

[lints]
workspace = true

[dev-dependencies]
criterion.workspace = true
insta.workspace = true
ntest = "0.9"

[[bench]]
name = "fp_set_throughput"
harness = false

[[bench]]
name = "fingerprint_throughput"
harness = false
