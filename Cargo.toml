    "crates/tla-logos",
    "crates/tla-logos-derive",
    "crates/tla-logos-codegen",
    # Wave 6 zero-dep: vendored rayon 1.12.0 umbrella (Part of #4250).
    # Consumer: tla-check parallel BFS. Package name stays `rayon` so
    # `[patch.crates-io]` redirects every graph consumer to the fork.
    # rayon-core + crossbeam-deque remain external leaf deps (umbrella-only).
    "crates/tla-rayon",
