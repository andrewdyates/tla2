[workspace]
resolver = "2"
members = [
    "crates/tla-mc-core",
    "crates/tla-core",
    "crates/tla-tir",
    "crates/tla-value",
    "crates/tla-eval",
    "crates/tla-check",
    "crates/tla-petri",
    "crates/pnml-tools",
    "crates/tla-codegen",
    "crates/tla-runtime",
    "crates/tla-z4",
    "crates/tla-zenon",
    "crates/tla-cert",
    "crates/tla-lsp",
    "crates/tla-cli",
    "crates/tla-jit",
    "crates/tla-jit-abi",
    "crates/tla-jit-runtime",
    "crates/tla-codegen-backend",
    "crates/tla-codegen-frontend",
    "crates/tla-regalloc",
    "crates/tla-llvm2",
    "crates/tla-bstr",
    "crates/tla-btor2",
    "crates/tla-tmir",
    # LLVM2 dialect framework (Part of #4251 #4253):
    # progressive lowering tower tla -> verif -> llvm. Skeleton only — not yet
    # wired into tMIR lowering. See designs/2026-04-19-llvm2-dialect-framework.md.
    "crates/tla-dialect",
    "crates/tla-aiger",
    "crates/tla-ar-archive-writer",
    "crates/tla-concurrent",
    "crates/tla-arc",
    # Tier 3 zero-dep: vendored bumpalo arena allocator (Part of #4250)
    "crates/tla-arena",
    # Tier 3 zero-dep: vendored parking_lot stack (parking_lot + parking_lot_core + lock_api)
    "crates/tla-lock/parking_lot",
    "crates/tla-lock/parking_lot_core",
    "crates/tla-lock/lock_api",
    "crates/tla-smallvec",
    # Tier 3 zero-dep (Wave 63, Part of #4250): verbatim fork of arbitrary
    # 1.4.2 (MIT OR Apache-2.0). Construct arbitrary instances of types for
    # fuzzing (libfuzzer/cargo-fuzz). Package name stays `arbitrary` so
    # `[patch.crates-io]` redirects every graph consumer to the single in-tree copy.
    "crates/tla-arbitrary",
    # Tier 3 zero-dep (Wave 62, Part of #4250): verbatim fork of assert_matches
    # 1.5.0 (MIT OR Apache-2.0). Provides `assert_matches!` macro for pattern
    # matching assertions in tests. Package name stays `assert_matches` so
    # `[patch.crates-io]` redirects every graph consumer to the single in-tree copy.
    "crates/tla-assert-matches",
    # Tier 3 zero-dep (Wave 62, Part of #4250): verbatim fork of atoi 2.0.0
    # (MIT). Parses integers directly from byte slices. Package name stays
    # `atoi` so `[patch.crates-io]` redirects every graph consumer to the
    # single in-tree copy.
    "crates/tla-atoi",
    # Tier 3 zero-dep (Wave 63, Part of #4250): verbatim fork of automod 1.0.16
    # (MIT OR Apache-2.0). Pulls in every source file in a directory as a
    # module. Package name stays `automod` so `[patch.crates-io]` redirects
    # every graph consumer to the single in-tree copy.
    "crates/tla-automod",
    # Tier 3 zero-dep (Wave 65, Part of #4250): verbatim fork of camino 1.2.2
    # (MIT OR Apache-2.0). UTF-8 encoded paths for Rust (Utf8Path/Utf8PathBuf).
    # Package name stays `camino` so `[patch.crates-io]` redirects every graph
    # consumer to the single in-tree copy.
    "crates/tla-camino",
    # Tier 3 zero-dep (Wave 14, Part of #4250): verbatim fork of cast 0.3.0
    # (MIT OR Apache-2.0). Pure-std, zero runtime deps. Transitive consumer:
    # criterion -> plotters. Fork keeps upstream `name = "cast"` so
    # `[patch.crates-io]` redirects every graph consumer to the single in-tree
    # copy — same upstream-name-preserving pattern as rowan/dashmap/crossbeam.
    "crates/tla-cast",
    # Tier 3 (Wave 66, Part of #4250): verbatim fork of chrono 0.4.44
    # (MIT OR Apache-2.0). Date and time library. Package name stays `chrono`
    # so `[patch.crates-io]` redirects every graph consumer to the single
    # in-tree copy.
    "crates/tla-chrono",
    # Tier 3 (Wave 66, Part of #4250): verbatim fork of ciborium 0.2.2
    # (Apache-2.0). Serde-compatible CBOR implementation. Only the top-level
    # `ciborium` crate is forked; companion `ciborium-io` / `ciborium-ll`
    # remain external leaf deps. Package name stays `ciborium` so
    # `[patch.crates-io]` redirects every graph consumer to the single
    # in-tree copy.
    "crates/tla-ciborium",
    # Tier 3 (Wave 66, Part of #4250): verbatim fork of cpufeatures 0.2.17
    # (MIT OR Apache-2.0). Lightweight, no_std runtime CPU feature detection
    # used by RustCrypto primitives (sha2, aes, etc.). Package name stays
    # `cpufeatures` so `[patch.crates-io]` redirects every graph consumer
    # to the single in-tree copy.
    "crates/tla-cpufeatures",
    # Tier 3 zero-dep: vendored allocator-api2 0.2.21 (Part of #4250, Wave 14).
    # Package name stays `allocator-api2` so `[patch.crates-io]` redirects every
    # transitive consumer (hashbrown 0.15, and any crate pulling in the stable
    # Allocator trait mirror) to the single in-workspace fork. Umbrella-only —
    # the upstream crate is a single lib with no sub-crates.
    "crates/tla-allocator-api2",
    # Tier 3 zero-dep: vendored strsim 0.11.1 (MIT) — string similarity metrics.
    # Consumed transitively by clap. Fork keeps upstream `name = "strsim"` so
    # `[patch.crates-io]` redirects every transitive consumer to the single
    # in-workspace copy (same pattern as rowan / dashmap / indexmap). Part of #4250.
    "crates/tla-strsim",
    # Tier 3 zero-dep: verbatim fork of tinyvec_macros 0.1.1 (Part of #4250).
    # Umbrella-only scope — tiny macro helper crate with no deps. Package name
    # stays "tinyvec_macros" so `[patch.crates-io]` redirects transitive
    # consumers (notably `tinyvec`) graph-wide.
    "crates/tla-tinyvec-macros",
    # Wave 27 zero-dep: verbatim fork of zerofrom 0.1.7 (Unicode-3.0) — trait
    # for constructing zero-copy types (ICU4X utility crate). Umbrella-only
    # scope: only the top-level `zerofrom` crate is forked; the companion
    # `zerofrom-derive` proc-macro crate remains an external leaf dep.
    # Package name stays `zerofrom` so `[patch.crates-io]` redirects every
    # transitive consumer (zerovec -> icu_* -> ...) to the single in-tree fork.
    # Part of #4250 zero-external-dep posture.
    "crates/tla-zerofrom",
    # Forked hasher stack — 0-external-dep posture (Part of #4250).
    # tla-hash-fx   → rustc-hash  (Apache-2.0 OR MIT) verbatim fork.
    # tla-hash-xxh3 → xxhash-rust (BSL-1.0) verbatim fork.
    # ahash (1 call site in tla-check) remains external for now — forking it would
    # drag in getrandom/zerocopy/once_cell/const-random/portable-atomic/cfg-if + build.rs,
    # which defeats the 0-dep goal. Tracked separately.
    "crates/tla-hash-fx",
    "crates/tla-hash-xxh3",
    # Wave 9 zero-dep: verbatim fork of fnv 1.0.7 (Apache-2.0 OR MIT) (Part of #4250).
    # Tiny (~200 LOC) Fowler–Noll–Vo hasher. Consumers: petgraph, tracing, proc-macro2
    # (transitive). Package name stays `fnv` so `[patch.crates-io]` redirects every
    # graph consumer to this fork.
    "crates/tla-fnv",
    # Forked rust-num stack — zero-external-dep arithmetic (Tier 2 #4250)
    "crates/tla-bignum",
    "crates/tla-bignum/traits",
    "crates/tla-bignum/integer",
    "crates/tla-bignum/bigint",
    # Wave 64 (Part of #4250): verbatim fork of bincode 1.3.3 (MIT) — binary encoder/decoder.
    # Package name stays `bincode` so `[patch.crates-io]` redirects transitive consumers.
    "crates/tla-bincode",
    # Wave 65 zero-dep: vendored bit_field 0.10.3 (Apache-2.0 OR MIT) — trait for
    # setting and getting ranges of bits. Package name stays `bit_field` so
    # `[patch.crates-io]` redirects transitive consumers. Part of #4250.
    "crates/tla-bit-field",
    # Wave 15 zero-dep: vendored bit-set 0.10 (Apache-2.0 OR MIT) — small bitset
    # library whose only runtime dep is bit-vec (also being forked in Wave 15).
    # Package name stays `bit-set` so `[patch.crates-io]` redirects transitive
    # consumers (proptest, etc.) graph-wide. Part of #4250.
    "crates/tla-bit-set",
    # Fork of bodil/im-rs 15.1 into the workspace (Tier 2 #4250, MPL-2.0)
    "crates/tla-im",
    # tla-xml → roxmltree (MIT OR Apache-2.0) verbatim fork (Part of #4250, Tier 2 zero-dep)
    "crates/tla-xml",
    # Tier 2 zero-dep forks (Part of #4250).
    # tla-tempfile: verbatim fork of tempfile 3.27.0 (MIT OR Apache-2.0). Consumers: tla-check, tla-cli.
    # tla-minilp:   verbatim fork of minilp 0.2.x (Apache-2.0). Consumer: tla-petri (LP-based invariants).
    "crates/tla-tempfile",
    "crates/tla-minilp",
    # Tier 2 zero-dep: vendored stacker stack-growth helper (Part of #4250).
    # Library name preserved as `stacker` so `use stacker::*` in tla-check /
    # tla-codegen / tla-eval is unchanged. psm / libc / cfg-if remain upstream
    # leaf deps (native platform stack manipulation, not forkable inline).
    "crates/tla-stack",
    # Tier 2 zero-dep: vendored ariadne diagnostic reporter (Part of #4250)
    "crates/tla-ariadne",
    # Tier 2 zero-dep: vendored rowan lossless syntax tree (Part of #4250).
    # Consumer: tla-core (TLA+ parser). Package name stays `rowan` so
    # [patch.crates-io] redirects transitive consumers graph-wide.
    "crates/tla-rowan",
    # Tier 2 zero-dep: vendored indexmap (insertion-ordered HashMap/HashSet).
    # `[patch.crates-io]` redirects all graph consumers (serde_json, toml,
    # cranelift-entity, etc.) so only ONE IndexMap type exists graph-wide.
    "crates/tla-indexmap",
    # Tier 3 zero-dep: vendored equivalent 1.0.2 (Apache-2.0 OR MIT) — Equivalent
    # / Comparable traits consumed by indexmap & hashbrown. Package name stays
    # `equivalent` so `[patch.crates-io]` redirects every transitive pull to the
    # single in-tree fork. Part of #4250 zero-external-dep posture.
    "crates/tla-equivalent",
    # Tier 2 zero-dep: vendored dashmap 6.1.0 (MIT) — concurrent HashMap.
    # Package name stays `dashmap` so `[patch.crates-io]` redirects every graph
    # consumer (tla-check / tla-eval / tla-codegen / tla-jit + any transitive)
    # to the single in-tree fork. Part of #4250 zero-external-dep posture.
    "crates/tla-dashmap",
    # Tier 3 (Wave 67, Part of #4250): verbatim fork of digest 0.10.7
    # (MIT OR Apache-2.0). Traits for cryptographic hash functions and MACs
    # used by RustCrypto primitives (sha2, sha3, blake2, hmac, etc.). Package
    # name stays `digest` so `[patch.crates-io]` redirects every graph consumer
    # to the single in-tree copy.
    "crates/tla-digest",
    # Tier 3 (Wave 71, Part of #4250): verbatim fork of sha2 0.10.9
    # (MIT OR Apache-2.0). Pure-Rust implementation of the SHA-2 family of
    # cryptographic hash functions (SHA-224, SHA-256, SHA-384, SHA-512). Built
    # on top of the `digest` traits and `cpufeatures` runtime detection (both
    # already forked in earlier waves). Package name stays `sha2` so
    # `[patch.crates-io]` redirects every graph consumer to the single
    # in-tree copy.
    "crates/tla-sha2",
    # Tier 3 (Wave 71, Part of #4250): verbatim fork of typenum 1.20.0
    # (MIT OR Apache-2.0). Type-level numbers evaluated at compile time —
    # provides the `U0`, `U1`, ... unsigned integer and `N1`, `P1`, ... signed
    # integer type families used for const-generic-ish APIs. Transitive consumer
    # of generic-array / cryptographic hash crates already forked in earlier
    # waves. Package name stays `typenum` so `[patch.crates-io]` redirects
    # every graph consumer to the single in-tree copy.
    "crates/tla-typenum",
    # Wave 19 Tier 2 zero-dep: vendored hashbrown 0.15.5 (MIT OR Apache-2.0) —
    # SwissTable hash map (same implementation used by Rust's std HashMap).
    # Package name stays `hashbrown` so `[patch.crates-io]` redirects every
    # transitive consumer (indexmap, dashmap, serde_json, z4, cranelift, etc.)
    # to the single in-tree fork. Part of #4250 zero-external-dep posture.
    "crates/tla-hashbrown",
    # Tier 2 zero-dep: vendored foldhash 0.1.5 (Zlib) — pure-Rust hasher.
    # Transitive consumer: hashbrown 0.15 (uses foldhash as its default hasher).
    # Package name stays `foldhash` so `[patch.crates-io]` redirects every graph
    # consumer to the single in-tree fork. Zero runtime deps (no_std-compatible).
    # Part of #4250 Wave 20 zero-external-dep posture.
    "crates/tla-foldhash",
    # Tier 3 zero-dep: vendored idna_adapter 1.2.1 (Apache-2.0 OR MIT) — back
    # end adapter for `idna`. Umbrella-only scope: only the adapter itself is
    # forked; its ICU4X leaf deps (icu_normalizer, icu_properties) remain
    # external. Package name stays `idna_adapter` so `[patch.crates-io]`
    # redirects every transitive consumer (idna -> url -> ...) to the single
    # in-tree fork. Part of #4250 zero-external-dep posture.
    "crates/tla-idna-adapter",
    # Wave 30 zero-dep: verbatim fork of syn 2.0.117 (MIT OR Apache-2.0) — the
    # top-level Rust parser used by every proc-macro in the graph (thiserror,
    # serde_derive, clap_derive, tracing-attributes, zerocopy-derive, and many
