\* TLC Model Checking Configuration for Editor.tla (minimal bounds)
\*
\* Minimal configuration with single-line buffer only. Disables multi-line
\* operations but still exercises core editing, cursor, undo/redo, and grouping.
\*
\* With the current Editor.tla group-change abstraction, this configuration is
\* tractable for exhaustive TLC checking (example run: 12,904 states generated).
\*
\* For quick CI validation, use simulation mode:
\*   java -jar tla2tools.jar -simulate num=10000 -config Editor-minimal.cfg Editor.tla

SPECIFICATION Spec

\* Minimal constants - single line buffer
\* Disables InsertNewline, CursorUp/Down, but exercises core operations
CONSTANTS
    MaxLines = 1
    MaxLineLen = 2
    MaxUndoDepth = 1
    MaxGroupDepth = 1
    MaxChangeSize = 1

\* Safety invariants to verify
\* Note: TypeInvariant omitted - expensive to check, safety invariants sufficient
INVARIANTS
    Safety
    CursorValid
    GroupDepthNonNegative

\* Temporal properties
PROPERTIES
    UndoRedoSymmetric
    GroupingBalanced
    SaveClearsModified
